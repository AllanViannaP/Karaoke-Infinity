<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Karaoke</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">K</div>
          <div>
            <h1 data-i18n="appTitle">Local Karaoke</h1>
            <p id="playerStatus">Waiting for a YouTube link</p>
          </div>
        </div>
        <div class="header-actions">
          <label class="language-control">
            <span data-i18n="languageLabel">Language</span>
            <select id="languageSelect" aria-label="Language">
              <option value="en">English</option>
              <option value="pt">Portugues</option>
              <option value="es">Espanol</option>
              <option value="ja">日本語</option>
            </select>
          </label>
          <div class="status-pill" id="micStatus">Microphone off</div>
        </div>
      </header>

      <main class="workspace">
        <section class="stage-panel" aria-label="Stage" data-i18n-attr="aria-label:stageAria">
          <div class="player-frame">
            <div id="player"></div>
          </div>

          <div class="transport-panel">
            <form class="url-form" id="youtubeForm">
              <label class="field-label" for="youtubeUrl" data-i18n="youtubeLinkLabel">YouTube link</label>
              <div class="url-row">
                <input id="youtubeUrl" name="youtubeUrl" type="url" inputmode="url" autocomplete="off" placeholder="https://www.youtube.com/watch?v=..." required>
                <button class="primary-button" type="submit" data-i18n="playNowButton">Play</button>
              </div>
            </form>

            <div class="transport-row" aria-label="Video controls" data-i18n-attr="aria-label:videoControlsAria">
              <button class="tool-button" id="prevVideo" type="button" title="Previous video" data-i18n="previousButton" data-i18n-attr="title:previousTitle">Previous</button>
              <button class="tool-button" id="playVideo" type="button" title="Play video" data-i18n="playButton" data-i18n-attr="title:playTitle">Play</button>
              <button class="tool-button" id="pauseVideo" type="button" title="Pause video" data-i18n="pauseButton" data-i18n-attr="title:pauseTitle">Pause</button>
              <button class="tool-button" id="nextVideo" type="button" title="Next video" data-i18n="nextButton" data-i18n-attr="title:nextTitle">Next</button>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="Queue and microphone" data-i18n-attr="aria-label:sidePanelAria">
          <section class="queue-panel">
            <div class="panel-heading">
              <h2 data-i18n="queueHeading">Queue</h2>
              <button class="ghost-button" id="clearQueue" type="button" data-i18n="clearQueueButton">Clear</button>
            </div>
            <ol class="queue-list" id="queueList"></ol>
          </section>

          <section class="mic-panel">
            <div class="panel-heading">
              <h2 data-i18n="microphoneHeading">Microphone</h2>
              <button class="primary-button" id="toggleMic" type="button">Turn on</button>
            </div>

            <label class="field-label" for="micDevice" data-i18n="inputLabel">Input</label>
            <select id="micDevice"></select>

            <label class="field-label" for="outputDevice" data-i18n="outputLabel">Output</label>
            <select id="outputDevice"></select>

            <div class="slider-row">
              <label for="micGain" data-i18n="gainLabel">Gain</label>
              <input id="micGain" type="range" min="0" max="200" value="100">
              <output id="micGainValue" for="micGain">100%</output>
            </div>

            <div class="slider-row">
              <label for="micDelay" data-i18n="delayLabel">Delay</label>
              <input id="micDelay" type="range" min="0" max="180" value="0">
              <output id="micDelayValue" for="micDelay">0 ms</output>
            </div>

            <canvas id="micMeter" width="640" height="120" aria-label="Microphone level" data-i18n-attr="aria-label:micMeterAria"></canvas>
            <p class="audio-note" id="audioNote">Use the Windows default output to choose the speaker.</p>
          </section>
        </aside>
      </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
  </body>
</html>
